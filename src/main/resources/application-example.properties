# Server port
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://YOUR_DB_HOST:3306/YOUR_DB_NAME?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings
# At least 256-bit secret key (64 characters in Hex/Plain)
platform.jwt.secret=YOUR_SUPER_SECRET_JWT_KEY_MINIMUM_64_CHARS_LONG
platform.jwt.expiration=86400000

# Mail Server Configuration (Gmail SMTP Example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL (for CORS and reset links)
app.frontend.url=http://localhost:5173

